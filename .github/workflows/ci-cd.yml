name: CI/CD — Groupe Marie Albert

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-cd:
    name: Lint, Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout, CI & Deploy
        run: |
          set -e
          git config --system --add safe.directory ${{ secrets.DEPLOY_PATH }}
          cd ${{ secrets.DEPLOY_PATH }}

          # Sauvegarder les données JSON de l'admin
          mkdir -p /tmp/ma_data_bak
          cp data/*.json /tmp/ma_data_bak/ 2>/dev/null || true

          # Récupérer la dernière version
          git fetch origin main
          git reset --hard origin/main

          # Restaurer les données JSON
          cp /tmp/ma_data_bak/*.json data/ 2>/dev/null || true
          rm -rf /tmp/ma_data_bak

          # Intégration continue
          npm ci
          npx tsc --noEmit
          npm run lint
          npm run build

          # Déploiement
          pm2 reload group-marie-albert --update-env \
            || pm2 start ecosystem.config.js
          pm2 save
