name: CI/CD — Groupe Marie Albert

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-cd:
    name: Lint, Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout, CI & Deploy
        run: |
          set -e
          git config --system --add safe.directory ${{ secrets.DEPLOY_PATH }}
          cd ${{ secrets.DEPLOY_PATH }}

          # Sauvegarder les données utilisateur et les images uploadées
          mkdir -p /tmp/ma_data_bak /tmp/ma_uploads_bak
          cp data/etablissements.json /tmp/ma_data_bak/ 2>/dev/null || true
          cp -r public/uploads/. /tmp/ma_uploads_bak/ 2>/dev/null || true

          # Récupérer la dernière version (config.json vient du git)
          git fetch origin main
          git reset --hard origin/main

          # Restaurer les données utilisateur et les images uploadées
          cp /tmp/ma_data_bak/etablissements.json data/ 2>/dev/null || true
          mkdir -p public/uploads
          cp -r /tmp/ma_uploads_bak/. public/uploads/ 2>/dev/null || true
          rm -rf /tmp/ma_data_bak /tmp/ma_uploads_bak

          # Intégration continue
          npm install
          npm run lint
          rm -rf .next
          npm run build

          # Déploiement
          pm2 restart group-marie-albert --update-env \
            || pm2 start ecosystem.config.js
          pm2 save
